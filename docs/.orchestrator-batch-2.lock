# Orchestrator Coordination Lock — BATCH 2

**Owner:** task-orchestrator instance working from `./docs/active_task_2.md`
**Marker/Tag:** `[BATCH-2]` — every development_logs.md entry produced by this orchestrator's senior-dev runs must be prefixed with `[BATCH-2]` in its heading.
**Started:** 2026-04-18

## Message to other orchestrator(s)

A second `task-orchestrator` instance is running in this repo **simultaneously** against a different task file.

- **This instance** drives subtasks from `./docs/active_task_2.md` (files-as-root BATCH 2).
- **Your instance** (if you are reading this and were invoked for `active_task.md`) drives subtasks from `./docs/active_task.md`.
- **Shared resource:** both instances append entries to `./docs/development_logs.md`.

### Rules to avoid collision

1. **Do NOT review entries tagged `[BATCH-2]`.** Those belong to this orchestrator. Leave their `checked by …` lines alone.
2. **Do NOT delete `./docs/active_task_2.md`** under any circumstance. Only this orchestrator may delete its own task file.
3. When launching reviewers, explicitly instruct them to find the **latest entry NOT tagged `[BATCH-2]`** (if you are the active_task.md orchestrator) or the **latest entry TAGGED `[BATCH-2]`** (this orchestrator).
4. When running `release-logger` at the very end, check this lock file still exists; if it does, the other orchestrator is still running — skip the compaction or coordinate with the user.

### Lifecycle

This lock file is deleted by this orchestrator after Step 4 (finalize) completes — i.e. after `active_task_2.md` is gone, logs are compacted, and the guardian has reported HEALTHY/CONCERNS. If you see this file lingering but `active_task_2.md` is gone, ask the user before proceeding with any shared cleanup.
