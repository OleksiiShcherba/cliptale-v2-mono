version: '3.9'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cliptale
      MYSQL_USER: cliptale
      MYSQL_PASSWORD: cliptale
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./apps/api/src/db/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    ports:
      - '3001:3001'
    environment:
      APP_DB_HOST: db
      APP_DB_PORT: '3306'
      APP_DB_NAME: cliptale
      APP_DB_USER: cliptale
      APP_DB_PASSWORD: cliptale
      APP_REDIS_URL: redis://redis:6379
      APP_JWT_SECRET: ${APP_JWT_SECRET:-local-dev-jwt-secret-change-in-production-minimum-32-chars}
      APP_JWT_EXPIRES_IN: ${APP_JWT_EXPIRES_IN:-7d}
      APP_S3_BUCKET: ${APP_S3_BUCKET}
      APP_S3_ENDPOINT: ${APP_S3_ENDPOINT:-}
      APP_S3_REGION: ${APP_S3_REGION:-us-east-1}
      APP_S3_ACCESS_KEY_ID: ${APP_S3_ACCESS_KEY_ID}
      APP_S3_SECRET_ACCESS_KEY: ${APP_S3_SECRET_ACCESS_KEY}
      APP_PORT: '3001'
      APP_CORS_ORIGIN: http://localhost:5173

  web-editor:
    build:
      context: .
      dockerfile: apps/web-editor/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '5173:5173'
    environment:
      VITE_PUBLIC_API_BASE_URL: http://localhost:3001

  media-worker:
    build:
      context: .
      dockerfile: apps/media-worker/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    environment:
      APP_REDIS_URL: redis://redis:6379
      APP_DB_HOST: db
      APP_DB_PORT: '3306'
      APP_DB_NAME: cliptale
      APP_DB_USER: cliptale
      APP_DB_PASSWORD: cliptale
      APP_S3_BUCKET: ${APP_S3_BUCKET}
      APP_S3_ENDPOINT: ${APP_S3_ENDPOINT:-}
      APP_S3_REGION: ${APP_S3_REGION:-us-east-1}
      APP_S3_ACCESS_KEY_ID: ${APP_S3_ACCESS_KEY_ID}
      APP_S3_SECRET_ACCESS_KEY: ${APP_S3_SECRET_ACCESS_KEY}

volumes:
  db_data:
  redis_data:
