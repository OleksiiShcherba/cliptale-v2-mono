version: '3.9'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cliptale
      MYSQL_USER: cliptale
      MYSQL_PASSWORD: cliptale
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    ports:
      - '3001:3001'
    environment:
      APP_DB_HOST: db
      APP_DB_PORT: '3306'
      APP_DB_NAME: cliptale
      APP_DB_USER: cliptale
      APP_DB_PASSWORD: cliptale
      APP_REDIS_URL: redis://redis:6379
      APP_JWT_SECRET: ${APP_JWT_SECRET:-local-dev-jwt-secret-change-in-production-minimum-32-chars}
      APP_JWT_EXPIRES_IN: ${APP_JWT_EXPIRES_IN:-7d}
      APP_S3_BUCKET: ${APP_S3_BUCKET}
      APP_S3_ENDPOINT: ${APP_S3_ENDPOINT:-}
      APP_S3_REGION: ${APP_S3_REGION:-us-east-1}
      APP_S3_ACCESS_KEY_ID: ${APP_S3_ACCESS_KEY_ID}
      APP_S3_SECRET_ACCESS_KEY: ${APP_S3_SECRET_ACCESS_KEY}
      APP_PORT: '3001'
      APP_CORS_ORIGIN: http://localhost:5173
      APP_DEV_AUTH_BYPASS: ${APP_DEV_AUTH_BYPASS:-false}
      APP_AI_ENCRYPTION_KEY: ${APP_AI_ENCRYPTION_KEY:-a0b1c2d3e4f5061728394a5b6c7d8e9f0a1b2c3d4e5f6071829304a5b6c7d8e9}
      APP_FAL_KEY: ${APP_FAL_KEY}
      APP_ELEVENLABS_API_KEY: ${APP_ELEVENLABS_API_KEY}
      NODE_ENV: development
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/project-schema:/app/packages/project-schema
      - ./packages/api-contracts:/app/packages/api-contracts
    command: npx tsx watch --tsconfig apps/api/tsconfig.json apps/api/src/index.ts

  web-editor:
    build:
      context: .
      dockerfile: apps/web-editor/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '5173:5173'
    environment:
      VITE_PUBLIC_API_BASE_URL: http://localhost:3001
    volumes:
      - ./apps/web-editor/src:/app/apps/web-editor/src
      - ./packages/project-schema:/app/packages/project-schema
      - ./packages/ui:/app/packages/ui
      - ./packages/editor-core:/app/packages/editor-core
      - ./packages/remotion-comps:/app/packages/remotion-comps

  media-worker:
    build:
      context: .
      dockerfile: apps/media-worker/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    environment:
      APP_REDIS_URL: redis://redis:6379
      APP_DB_HOST: db
      APP_DB_PORT: '3306'
      APP_DB_NAME: cliptale
      APP_DB_USER: cliptale
      APP_DB_PASSWORD: cliptale
      APP_S3_BUCKET: ${APP_S3_BUCKET}
      APP_S3_ENDPOINT: ${APP_S3_ENDPOINT:-}
      APP_S3_REGION: ${APP_S3_REGION:-us-east-1}
      APP_S3_ACCESS_KEY_ID: ${APP_S3_ACCESS_KEY_ID}
      APP_S3_SECRET_ACCESS_KEY: ${APP_S3_SECRET_ACCESS_KEY}
      APP_OPENAI_API_KEY: ${APP_OPENAI_API_KEY}
      APP_FAL_KEY: ${APP_FAL_KEY}
      APP_ELEVENLABS_API_KEY: ${APP_ELEVENLABS_API_KEY}
    volumes:
      - ./apps/media-worker/src:/app/apps/media-worker/src
      - ./packages/project-schema:/app/packages/project-schema
    command: npx tsx watch --tsconfig apps/media-worker/tsconfig.json apps/media-worker/src/index.ts

  render-worker:
    build:
      context: .
      dockerfile: apps/render-worker/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    environment:
      APP_REDIS_URL: redis://redis:6379
      APP_DB_HOST: db
      APP_DB_PORT: '3306'
      APP_DB_NAME: cliptale
      APP_DB_USER: cliptale
      APP_DB_PASSWORD: cliptale
      APP_S3_BUCKET: ${APP_S3_BUCKET}
      APP_S3_ENDPOINT: ${APP_S3_ENDPOINT:-}
      APP_S3_REGION: ${APP_S3_REGION:-us-east-1}
      APP_S3_ACCESS_KEY_ID: ${APP_S3_ACCESS_KEY_ID}
      APP_S3_SECRET_ACCESS_KEY: ${APP_S3_SECRET_ACCESS_KEY}
      # Chromium installed in the image at build time — required by Remotion renderMedia.
      APP_CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium
      # Run Chrome in no-sandbox mode inside Docker (no user namespace support).
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
    volumes:
      - ./apps/render-worker/src:/app/apps/render-worker/src
      - ./packages/project-schema:/app/packages/project-schema
      - ./packages/remotion-comps:/app/packages/remotion-comps
    command: npx tsx watch --tsconfig apps/render-worker/tsconfig.json apps/render-worker/src/index.ts

volumes:
  db_data:
  redis_data:
