version: '3.9'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cliptale
      MYSQL_USER: cliptale
      MYSQL_PASSWORD: cliptale
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./apps/api/src/db/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
